<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Player</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;user-select:none;margin:0;padding:0;}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;}
.ap-device{width:660px;height:340px;background:#0a0a0a;border-radius:28px;border:1.5px solid #1e1e1e;position:relative;overflow:hidden;}
.ap-bg-blur{position:absolute;inset:-60px;filter:blur(80px) saturate(2);opacity:.22;transition:background 2.2s ease;z-index:0;animation:blur-breathe 4s ease-in-out infinite;}
.ap-bg-blur.paused-anim{animation-play-state:paused;}
@keyframes blur-breathe{0%,100%{opacity:.16;transform:scale(1);}50%{opacity:.28;transform:scale(1.06);}}

/* screensaver */
.ap-screensaver{position:absolute;inset:0;z-index:30;background:#000;border-radius:28px;opacity:0;pointer-events:none;transition:opacity 1.2s ease;}
.ap-screensaver.active{opacity:1;pointer-events:all;}
.ap-ss-art{width:80px;height:80px;border-radius:50%;position:absolute;border:1.5px solid #1a1a1a;}
.ap-ss-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:8px;color:#1e1e1e;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}

/* lyrics panel slides up */
.ap-lyrics-panel{position:absolute;inset:0;z-index:20;background:#0a0a0a;border-radius:28px;display:flex;transform:translateY(100%);transition:transform .45s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.ap-lyrics-panel.open{transform:translateY(0);pointer-events:all;}
.ap-lp-bg{position:absolute;inset:-60px;filter:blur(80px) saturate(2);opacity:.12;transition:background 2.2s ease;z-index:0;animation:blur-breathe 4s ease-in-out infinite;}
.ap-lp-inner{position:relative;z-index:1;width:100%;height:100%;display:flex;}

/* lyrics left */
.ap-lp-left{width:176px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px 0 20px 20px;}
.ap-lp-mini-vinyl{width:100px;height:100px;border-radius:50%;background:#111;border:1px solid #1c1c1c;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;animation:spin-vinyl 14s linear infinite;}
.ap-lp-mini-vinyl.paused{animation-play-state:paused;}
@keyframes spin-vinyl{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ap-lp-mini-grooves{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,transparent 20px,rgba(255,255,255,.016) 21px,transparent 22px),radial-gradient(circle,transparent 28px,rgba(255,255,255,.013) 29px,transparent 30px),radial-gradient(circle,transparent 36px,rgba(255,255,255,.010) 37px,transparent 38px),radial-gradient(circle,transparent 44px,rgba(255,255,255,.008) 45px,transparent 46px);}
.ap-lp-mini-art{width:46px;height:46px;border-radius:50%;object-fit:cover;position:absolute;z-index:2;border:2px solid #1a1a1a;}
.ap-lp-mini-dot{width:6px;height:6px;border-radius:50%;background:#1e1e1e;border:1px solid #2e2e2e;position:absolute;z-index:3;}
.ap-lp-prog-wrap{width:126px;}
.ap-lp-time-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.ap-lp-time{font-size:8px;color:#2a2a2a;letter-spacing:.05em;font-variant-numeric:tabular-nums;}
.ap-lp-prog-track{width:100%;height:2px;background:#1c1c1c;border-radius:2px;cursor:pointer;position:relative;transition:height .2s;}
.ap-lp-prog-track:hover,.ap-lp-prog-track.dragging{height:3px;}
.ap-lp-prog-fill{height:100%;border-radius:2px;background:#c0c0c0;transition:width .3s linear,box-shadow .3s;position:relative;}
.ap-lp-prog-track:hover .ap-lp-prog-fill,.ap-lp-prog-track.dragging .ap-lp-prog-fill{box-shadow:0 0 6px 1px var(--lp-glow,#fff3);transition:width 0s,box-shadow .3s;}
.ap-lp-prog-thumb{position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fff;opacity:0;pointer-events:none;transition:opacity .2s;}
.ap-lp-prog-track:hover .ap-lp-prog-thumb,.ap-lp-prog-track.dragging .ap-lp-prog-thumb{opacity:1;}
.ap-lp-controls{display:flex;align-items:center;gap:12px;}
.ap-lp-skip{background:none;border:none;cursor:pointer;padding:4px;color:#3a3a3a;line-height:0;transition:color .2s,transform .15s;}
.ap-lp-skip:hover{color:#999;}.ap-lp-skip:active{transform:scale(.88);}
.ap-lp-play{width:36px;height:36px;border-radius:50%;background:#d8d8d8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0a0a0a;transition:background .2s,transform .15s;}
.ap-lp-play:hover{background:#fff;}.ap-lp-play:active{transform:scale(.93);}

/* lyrics right */
.ap-lp-right{flex:1;display:flex;flex-direction:column;padding:24px 26px 22px 0;}
.ap-lp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0;}
.ap-lp-label{font-size:8px;color:#2e2e2e;letter-spacing:.14em;text-transform:uppercase;}
.ap-lp-close{background:none;border:.5px solid #222;border-radius:20px;color:#2e2e2e;font-size:8px;padding:2px 9px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.06em;transition:color .2s,border-color .2s;}
.ap-lp-close:hover{color:#888;border-color:#444;}
.ap-lp-scroll{flex:1;overflow:hidden;position:relative;mask-image:linear-gradient(to bottom,transparent 0%,black 14%,black 80%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 14%,black 80%,transparent 100%);}
.ap-lp-lines{display:flex;flex-direction:column;transition:transform .55s cubic-bezier(.22,1,.36,1);}
.ap-lyric-line{font-size:15px;font-weight:300;color:#1e1e1e;line-height:1.85;cursor:default;transition:color .4s,font-size .3s,font-weight .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-lyric-line.active{color:#e0e0e0;font-size:17px;font-weight:400;}
.ap-lyric-line.near{color:#3a3a3a;}

/* main layout */
.ap-layout{position:relative;z-index:1;height:100%;display:flex;align-items:center;}
.ap-left{width:300px;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
.ap-vinyl-stage{width:240px;height:240px;position:relative;}
.ap-vinyl-slot{position:absolute;width:240px;height:240px;display:flex;align-items:center;justify-content:center;transition:transform .65s cubic-bezier(.4,0,.2,1),opacity .65s ease;}
.ap-vinyl-slot.current{transform:translateY(0);opacity:1;}
.ap-vinyl-slot.exit-up{transform:translateY(-120%);opacity:0;}
.ap-vinyl-slot.exit-down{transform:translateY(120%);opacity:0;}
.ap-vinyl-slot.enter-from-below{transform:translateY(120%);opacity:0;}
.ap-vinyl-slot.enter-from-above{transform:translateY(-120%);opacity:0;}
.ap-vinyl-disk{width:240px;height:240px;border-radius:50%;background:#111;border:1px solid #1c1c1c;position:absolute;display:flex;align-items:center;justify-content:center;animation:spin-vinyl 14s linear infinite;}
.ap-vinyl-disk.paused{animation-play-state:paused;}
.ap-vinyl-grooves{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,transparent 52px,rgba(255,255,255,.016) 53px,transparent 54px),radial-gradient(circle,transparent 63px,rgba(255,255,255,.013) 64px,transparent 65px),radial-gradient(circle,transparent 74px,rgba(255,255,255,.010) 75px,transparent 76px),radial-gradient(circle,transparent 85px,rgba(255,255,255,.008) 86px,transparent 87px),radial-gradient(circle,transparent 96px,rgba(255,255,255,.007) 97px,transparent 98px),radial-gradient(circle,transparent 107px,rgba(255,255,255,.005) 108px,transparent 109px);}
.ap-album-art{width:108px;height:108px;border-radius:50%;object-fit:cover;position:absolute;z-index:2;border:3px solid #1a1a1a;}
.ap-center-dot{width:10px;height:10px;border-radius:50%;background:#1e1e1e;border:1px solid #2e2e2e;position:absolute;z-index:3;}

/* needle */
.ap-needle{position:absolute;top:calc(50% - 132px);left:calc(50% + 82px);z-index:10;}
.ap-needle-arm{width:3px;height:66px;background:linear-gradient(to bottom,#666,#444 65%,#555);border-radius:2px 2px 1px 1px;transform-origin:top center;transform:rotate(30deg);transition:transform .75s ease;}
.ap-needle-arm.lifted{transform:rotate(5deg);}
.ap-needle-arm::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:#4a4a4a;border:1px solid #666;}
.ap-needle-arm::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#888;}

/* right panel */
.ap-right{flex:1;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:28px 30px 26px 8px;}
.ap-top-row{display:flex;align-items:center;justify-content:space-between;}
.ap-status{display:flex;align-items:center;gap:5px;font-size:8px;color:#363636;letter-spacing:.12em;text-transform:uppercase;}
.ap-dot{width:4px;height:4px;border-radius:50%;background:#2ecc71;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.ap-top-actions{display:flex;align-items:center;gap:5px;}
.ap-micro-btn{font-size:7.5px;color:#282828;background:none;border:.5px solid #1e1e1e;border-radius:20px;padding:2px 7px;cursor:pointer;letter-spacing:.07em;font-family:'Inter',sans-serif;transition:color .2s,border-color .2s;line-height:1.8;display:flex;align-items:center;gap:3px;}
.ap-micro-btn:hover{color:#777;border-color:#3a3a3a;}.ap-micro-btn.active{color:#888;border-color:#444;}
.ap-track-block{display:flex;flex-direction:column;gap:6px;}
.ap-track-name{font-size:22px;font-weight:300;color:#e2e2e2;letter-spacing:-.01em;line-height:1.2;}
.ap-inline-lyric{font-size:11px;font-weight:300;color:#3a3a3a;letter-spacing:.02em;line-height:1.3;height:15px;overflow:hidden;transition:color .4s,opacity .3s;opacity:0;}
.ap-inline-lyric.visible{opacity:1;color:#606060;}
.ap-progress-section{width:100%;}
.ap-time-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.ap-time{font-size:9px;color:#2a2a2a;letter-spacing:.05em;font-variant-numeric:tabular-nums;transition:color .15s;}
.ap-time.dragging{color:#888;}
.ap-progress-track{width:100%;height:3px;background:#1c1c1c;border-radius:3px;cursor:pointer;position:relative;transition:height .2s;}
.ap-progress-track:hover,.ap-progress-track.dragging{height:5px;}
.ap-progress-fill{height:100%;border-radius:3px;background:#d4d4d4;transition:width .3s linear,box-shadow .3s;position:relative;pointer-events:none;}
.ap-progress-track:hover .ap-progress-fill,.ap-progress-track.dragging .ap-progress-fill{box-shadow:0 0 8px 2px var(--track-glow,#fff4);transition:width 0s,box-shadow .3s;}
.ap-progress-thumb{position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#fff;opacity:0;pointer-events:none;transition:opacity .2s,transform .15s;box-shadow:0 0 6px rgba(0,0,0,.5);}
.ap-progress-track:hover .ap-progress-thumb,.ap-progress-track.dragging .ap-progress-thumb{opacity:1;}
.ap-progress-track.dragging .ap-progress-thumb{transform:translateY(-50%) scale(1.25);}
.ap-controls{display:flex;align-items:center;gap:24px;}
.ap-btn-skip{background:none;border:none;cursor:pointer;padding:6px;color:#3e3e3e;line-height:0;transition:color .2s,transform .15s;}
.ap-btn-skip:hover{color:#999;}.ap-btn-skip:active{transform:scale(.88);}
.ap-btn-play{width:50px;height:50px;border-radius:50%;background:#e0e0e0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0a0a0a;transition:background .2s,transform .15s;}
.ap-btn-play:hover{background:#fff;}.ap-btn-play:active{transform:scale(.93);}
.ap-source-badge{font-size:7px;color:#1a1a1a;letter-spacing:.1em;text-transform:uppercase;}
</style>
</head>

  const c=document.createElement('canvas');c.width=220;c.height=220;
  const ctx=c.getContext('2d');
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(110,110,110,0,Math.PI*2);ctx.fill();
  const g=ctx.createRadialGradient(80,70,10,110,110,100);
  g.addColorStop(0,accent+'aa');g.addColorStop(0.5,accent+'44');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(110,110,110,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(110+Math.cos(i*0.8)*40,110+Math.sin(i*0.8)*40,12+i*3,0,Math.PI*2);ctx.fill();}
  return c.toDataURL();
}

function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s)%60).padStart(2,'0');}
function getActiveLyric(t,lyrics){let i=0;for(let j=0;j<lyrics.length;j++)if(t>=lyrics[j].t)i=j;return i;}

function applyTheme(t){
  const bg=`radial-gradient(circle at 20% 50%, ${t.accent}99 0%, ${t.color}55 50%, transparent 80%)`;
  document.getElementById('apBgBlur').style.background=bg;
  document.getElementById('lpBg').style.background=bg;
  document.getElementById('progressTrack').style.setProperty('--track-glow',t.glow);
  document.getElementById('lpProgTrack').style.setProperty('--lp-glow',t.glow);
}

function updateProgress(){
  const t=tracks[currentTrack];
  const pct=Math.min((elapsed/t.duration)*100,100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('lpProgFill').style.width=pct+'%';
  document.getElementById('timeElapsed').textContent=fmt(elapsed);
  document.getElementById('lpElapsed').textContent=fmt(elapsed);
}

function buildLyricsDOM(track){
  const lines=document.getElementById('lpLines');lines.innerHTML='';
  track.lyrics.forEach((l,i)=>{
    const el=document.createElement('div');
    el.className='ap-lyric-line';el.textContent=l.text;el.id='ll-'+i;
    lines.appendChild(el);
  });
}

function scrollToActive(idx){
  const area=document.getElementById('lpScroll');
  const lines=document.getElementById('lpLines');
  const el=document.getElementById('ll-'+idx);
  if(!el)return;
  const target=el.offsetTop-area.offsetHeight/2+el.offsetHeight/2;
  lines.style.transform=`translateY(${-Math.max(0,target)}px)`;
}

function updateLyricsHighlight(){
  const idx=getActiveLyric(elapsed,tracks[currentTrack].lyrics);
  document.querySelectorAll('.ap-lyric-line').forEach((el,i)=>{
    el.classList.remove('active','near');
    if(i===idx)el.classList.add('active');
    else if(i===idx-1||i===idx+1)el.classList.add('near');
  });
  scrollToActive(idx);
}

function updateInlineLyric(){
  const track=tracks[currentTrack];
  const idx=getActiveLyric(elapsed,track.lyrics);
  const el=document.getElementById('inlineLyric');
  if(!lyricsOpen){el.classList.remove('visible');return;}
  if(idx!==lastLyricIdx){
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=track.lyrics[idx].text;el.classList.add('visible');el.style.opacity='';},200);
    lastLyricIdx=idx;
  }
}

function syncPlayIcons(){
  const pauseSVG_lg='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  const playSVG_lg='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  const pauseSVG_sm='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  const playSVG_sm='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  document.getElementById('playIcon').innerHTML=isPlaying?pauseSVG_lg:playSVG_lg;
  document.getElementById('lpPlayIcon').innerHTML=isPlaying?pauseSVG_sm:playSVG_sm;
}

function makeVinylSlot(artSrc,spinning){
  const slot=document.createElement('div');slot.className='ap-vinyl-slot';
  const disk=document.createElement('div');disk.className='ap-vinyl-disk'+(spinning?'':' paused');
  const gr=document.createElement('div');gr.className='ap-vinyl-grooves';
  const art=document.createElement('img');art.className='ap-album-art';art.src=artSrc;
  const dot=document.createElement('div');dot.className='ap-center-dot';
  disk.append(gr,art,dot);slot.appendChild(disk);return slot;
}

function setPauseOnDisk(paused){
  const d=document.querySelector('#vinylStage .ap-vinyl-disk');if(d)d.classList.toggle('paused',paused);
  document.getElementById('miniVinyl').classList.toggle('paused',paused);
}

function transitionVinyl(artSrc,direction,spinning,onDone){
  const stage=document.getElementById('vinylStage');
  const old=stage.querySelector('.ap-vinyl-slot');
  const slot=makeVinylSlot(artSrc,spinning);
  const ec=direction==='forward'?'enter-from-below':'enter-from-above';
  const xc=direction==='forward'?'exit-up':'exit-down';
  slot.classList.add(ec);stage.appendChild(slot);
  void slot.offsetWidth;
  if(old)old.classList.add(xc);
  slot.classList.remove(ec);slot.classList.add('current');
  setTimeout(()=>{if(old)old.remove();if(onDone)onDone();},680);
}

function initVinyl(artSrc){
  const stage=document.getElementById('vinylStage');stage.innerHTML='';
  const slot=makeVinylSlot(artSrc,isPlaying);slot.classList.add('current');stage.appendChild(slot);
}

function renderTrack(idx,direction){
  if(transitioning)return;
  const t=tracks[idx];
  const artSrc=makeArt(t.artColor,t.artAccent);
  applyTheme(t);
  document.getElementById('trackName').textContent=t.name;
  document.getElementById('timeDuration').textContent=fmt(t.duration);
  document.getElementById('lpDuration').textContent=fmt(t.duration);
  document.getElementById('ssArt').src=artSrc;
  document.getElementById('miniArt').src=artSrc;
  buildLyricsDOM(t);
  const il=document.getElementById('inlineLyric');il.textContent='';il.classList.remove('visible');lastLyricIdx=-1;
  if(direction===null){initVinyl(artSrc);updateProgress();updateInlineLyric();updateLyricsHighlight();return;}
  transitioning=true;
  document.getElementById('needleArm').classList.add('lifted');
  transitionVinyl(artSrc,direction,isPlaying,()=>{
    transitioning=false;
    if(isPlaying)document.getElementById('needleArm').classList.remove('lifted');
    updateProgress();updateInlineLyric();updateLyricsHighlight();
  });
}

function startTicker(){
  clearInterval(ticker);
  ticker=setInterval(()=>{
    if(!isPlaying)return;
    elapsed+=0.5;
    if(elapsed>=tracks[currentTrack].duration){elapsed=0;nextTrack();return;}
    updateProgress();updateInlineLyric();updateLyricsHighlight();
  },500);
}

function togglePlay(){
  isPlaying=!isPlaying;syncPlayIcons();setPauseOnDisk(!isPlaying);
  const n=document.getElementById('needleArm'),b=document.getElementById('apBgBlur');
  if(!isPlaying){n.classList.add('lifted');b.classList.add('paused-anim');startScreensaverTimer();}
  else{n.classList.remove('lifted');b.classList.remove('paused-anim');clearTimeout(screensaverTimer);if(screensaverActive)wakeFromScreensaver();}
}
function nextTrack(){currentTrack=(currentTrack+1)%tracks.length;elapsed=0;renderTrack(currentTrack,'forward');}
function prevTrack(){
  if(elapsed>4){elapsed=0;updateProgress();return;}
  currentTrack=(currentTrack-1+tracks.length)%tracks.length;elapsed=0;renderTrack(currentTrack,'backward');
}
function toggleKeepOn(){
  keepOn=!keepOn;const b=document.getElementById('keepOnBtn');
  b.textContent=keepOn?'☀ activa':'☽ activa';b.classList.toggle('active',keepOn);
}
function toggleLyrics(){
  lyricsOpen=!lyricsOpen;
  document.getElementById('lyricsPanel').classList.toggle('open',lyricsOpen);
  document.getElementById('lyricsBtn').classList.toggle('active',lyricsOpen);
  if(lyricsOpen){lastLyricIdx=-1;updateInlineLyric();setTimeout(updateLyricsHighlight,460);}
  else document.getElementById('inlineLyric').classList.remove('visible');
}

function setupDrag(trackEl,onDrag,onUp){
  let drag=false;
  const pct=e=>{const r=trackEl.getBoundingClientRect();const x=e.touches?e.touches[0].clientX:e.clientX;return Math.max(0,Math.min(1,(x-r.left)/r.width));};
  trackEl.addEventListener('mousedown',e=>{drag=true;trackEl.classList.add('dragging');onDrag(pct(e));e.preventDefault();});
  trackEl.addEventListener('touchstart',e=>{drag=true;trackEl.classList.add('dragging');onDrag(pct(e));e.preventDefault();},{passive:false});
  window.addEventListener('mousemove',e=>{if(!drag)return;onDrag(pct(e));});
  window.addEventListener('touchmove',e=>{if(!drag)return;onDrag(pct(e));e.preventDefault();},{passive:false});
  const end=()=>{if(!drag)return;drag=false;trackEl.classList.remove('dragging');if(onUp)onUp();};
  window.addEventListener('mouseup',end);window.addEventListener('touchend',end);
}

function sharedDrag(p){
  elapsed=p*tracks[currentTrack].duration;lastLyricIdx=-1;
  const w=(p*100)+'%';
  document.getElementById('progressFill').style.width=w;
  document.getElementById('lpProgFill').style.width=w;
  document.getElementById('timeElapsed').textContent=fmt(elapsed);
  document.getElementById('lpElapsed').textContent=fmt(elapsed);
  document.getElementById('timeElapsed').classList.add('dragging');
  updateInlineLyric();updateLyricsHighlight();
}
setupDrag(document.getElementById('progressTrack'),sharedDrag,()=>{document.getElementById('timeElapsed').classList.remove('dragging');updateProgress();});
setupDrag(document.getElementById('lpProgTrack'),sharedDrag,()=>updateProgress());

function startScreensaverTimer(){clearTimeout(screensaverTimer);screensaverTimer=setTimeout(activateScreensaver,120000);}
function activateScreensaver(){screensaverActive=true;document.getElementById('screensaver').classList.add('active');ssX=50;ssY=50;floatArt();}
function floatArt(){
  const el=document.getElementById('ssArt');const W=660,H=340,S=80;
  ssX+=ssVx;ssY+=ssVy;
  if(ssX<=0||ssX>=W-S){ssVx*=-1;ssX=Math.max(0,Math.min(ssX,W-S));}
  if(ssY<=0||ssY>=H-S){ssVy*=-1;ssY=Math.max(0,Math.min(ssY,H-S));}
  el.style.left=ssX+'px';el.style.top=ssY+'px';
  ssRaf=requestAnimationFrame(floatArt);
}
function wakeFromScreensaver(){screensaverActive=false;document.getElementById('screensaver').classList.remove('active');cancelAnimationFrame(ssRaf);}

renderTrack(0,null);startTicker();
</script>
